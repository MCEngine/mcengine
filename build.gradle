plugins {
    id 'com.github.johnrengelman.shadow' version '8.1.1'
    id 'java'
    id 'maven-publish'
    id 'signing'
}

signing {
    useInMemoryPgpKeys(
        System.getenv('GPG_KEY_ID'),
        System.getenv('GPG_PASSWORD')
    )
    sign publishing.publications
}

version = project.findProperty("${project.name}-version") ?: 'unspecified'
group = 'io.github.mcengine'

allprojects {
    group = 'io.github.mcengine'

    apply plugin: 'java'
    apply plugin: 'com.github.johnrengelman.shadow'

    repositories {
        mavenCentral()
        mavenLocal()
          maven {
            url = 'https://hub.spigotmc.org/nexus/content/repositories/snapshots/'

            // As of Gradle 5.1, you can limit this to only those
            // dependencies you expect from it
            content {
                includeGroup 'org.bukkit'
                includeGroup 'org.spigotmc'
            }
        }
        maven { url = 'https://oss.sonatype.org/content/repositories/snapshots' }
        maven { url = 'https://oss.sonatype.org/content/repositories/central' }
    }
}

subprojects {
    apply plugin: 'java'

    // Disable the 'jar' task if needed
    tasks.named('jar').configure {
        enabled = false
    }

    def excludeBuildProjects = [':server']
    if (project.path in excludeBuildProjects) {
        tasks.matching { it.name == 'shadowJar' }.configureEach {
            enabled = false
        }
    }

    // Get submodules info, ensure version property is not null
    version = project.findProperty("${project.name}-version") ?: 'unspecified'

	shadowJar {
		archiveClassifier = ""
        destinationDirectory.set(file("${rootProject.buildDir}/libs"))

        // Change the JAR name if path starts with 'server:{sub-projectName}'
        if (project.path.startsWith(':server') || project.name == 'common') {
            archiveBaseName.set("MCEngine-${project.name}")
        } else {
            archiveBaseName.set(project.name)
        }
	}

    if (project.path.startsWith(':server:')) {
        dependencies {
            implementation project(path: ':mcengine-api', configuration: 'shadow')
            implementation project(path: ':common', configuration: 'shadow')
        }
    }

    // Bukkit server specific configuration
    if (project.name == 'spigotmc') {
        processResources {
            def props = [version: version]
            inputs.properties(props)
            filteringCharset 'UTF-8'
            filesMatching('plugin.yml') {
                expand(props)
            }
        }
    }

    if (project.name == 'mcengine-api') {
        apply plugin: 'maven-publish'
        publishing {
            repositories {
                // GitHub Package
                maven {
                    name = 'GitHubPackages'
                    url = uri('https://maven.pkg.github.com/MCEngine/mcengine')
                    credentials {
                        username = System.getenv('GIT_USER')
                        password = System.getenv('MCENGINE_GITHUB_TOKEN_PKG')
                    }
                }

                // Maven Central
                maven {
                    name = 'MavenCentral'
                    url = uri('https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/')
                    credentials {
                        username = System.getenv('SONATYPE_USERNAME')
                        password = System.getenv('SONATYPE_PASSWORD')
                    }
                }
            }
            publications {
                mavenJava(MavenPublication) {
                    artifact(tasks.named('shadowJar').get())

                    pom {
                        name = 'MCEngine'
                        description = 'An API for MCEngine Project'
                        url = 'https://github.com/MCEngine/mcengine'

                        licenses {
                            license {
                                name = 'The MIT License'
                                url = 'https://github.com/MCEngine/mcengine/blob/master/LICENSE'
                                distribution = 'repo'
                            }
                        }

                        scm {
                            connection = 'scm:git:git://github.com/MCEngine/mcengine.git'
                            developerConnection = 'scm:git:ssh://github.com:MCEngine/mcengine.git'
                            url = 'https://github.com/MCEngine/mcengine'
                        }

                        developers {
                            developer {
                                id = 'jetsadawijit'
                                name = 'Jetsada Wijit'
                                email = 'jetsadawijit@outlook.com'
                                url = 'https://jetsadawijit.github.io'
                            }
                        }
                    }
                }
            }
        }
    }
}

dependencies {
    implementation project(path: ':mcengine-api', configuration: 'shadow')
    implementation project(path: ':common', configuration: 'shadow')

    // Dynamically include all server projects
    rootProject.subprojects.each { subproject ->
        if (subproject.name != 'mcengine-api' && subproject.name != 'common') {
            def serverProjectPath = subproject.path.startsWith(':server') ? subproject.path : ":server:${subproject.name}"
            implementation project(path: serverProjectPath, configuration: 'shadow')
        }
    }
}

shadowJar {
    version = version
    archiveClassifier = ""
    archiveBaseName.set('MCEngine')
}

// Disable the 'jar' task if needed
tasks.named('jar').configure {
    enabled = false
}
build.dependsOn(shadowJar)
